# Alertmanager configuration — Real Estate Aggregation Platform
#
# Routes all alerts to the console receiver for MVP. Email receiver
# is templated below; uncomment and fill in SMTP details to enable.

route:
  receiver: "console"
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

receivers:
  - name: "console"
    webhook_configs:
      # MVP: no-op webhook — alerts visible in Alertmanager UI at :9093.
      # Replace with email/Slack/PagerDuty in production.
      - url: "http://127.0.0.1:65535/"
        send_resolved: true

