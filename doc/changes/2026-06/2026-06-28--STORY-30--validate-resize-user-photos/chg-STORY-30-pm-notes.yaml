decisions:
  - text: "Allowed upload formats: JPEG, PNG, WebP — standard web image formats sufficient for real estate photos."
    date: "2026-06-28"
  - text: "Max file size: 10MB — generous enough for high-res photos but protects MinIO storage."
    date: "2026-06-28"
  - text: "Max dimensions: 2048px on longest side — resize down maintaining aspect ratio if exceeded."
    date: "2026-06-28"
  - text: "Auto-generate 400x300 thumbnail (reuse existing upload_thumbnail logic from MinioStorageClient). Store in same MinIO path convention."
    date: "2026-06-28"
  - text: "Track metadata in photo_assets table — create PhotoAsset ORM model and Alembic migration (table exists in spec schema 070-DATABASE.md)."
    date: "2026-06-28"
  - text: "No auth enforcement on upload endpoint for now — auth system not yet built. Document as future TODO."
    date: "2026-06-28"
  - text: "Upload endpoint: POST /api/v1/photos/upload — accepts multipart file, returns SHA256 hash + photo/thumbnail URLs."
    date: "2026-06-28"
  - text: "Reuse existing MinIO path convention: photos/{sha256[:2]}/{sha256[2:4]}/{sha256}.jpg"
    date: "2026-06-28"
  - text: "Use MinioStorageClient from scrapper-base (already has upload_photo + upload_thumbnail). Import in real-estate-api."
    date: "2026-06-28"
