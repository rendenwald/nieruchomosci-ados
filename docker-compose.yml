# Real Estate Aggregation Platform — Local Development Stack
#
# Usage:
#   docker compose up -d                    # Start all services
#   docker compose down                     # Stop all services
#   docker compose down -v                  # Stop + delete volumes (reset data)
#   docker compose logs -f <service>        # Tail logs for a service
#
# Configuration:
#   Copy .env.example → .env and adjust values.
#   Credentials are read from .env (git-ignored).
#
# Services:
#   postgres    — PostgreSQL 16 + PostGIS (port 5432)
#   redis       — Redis 7 cache (port 6379)
#   minio       — MinIO object storage (API: 9000, Console: 9001)
#   pushgateway — Prometheus Pushgateway for batch job metrics (port 9091)
#   prometheus  — Prometheus metrics scraper (port 9090)
#   alertmanager — Alertmanager alert routing (port 9093)
#
# Future additions:
#   grafana, loki

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: realestate-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-realestate}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-realestate}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - realestate-net

  redis:
    image: redis:7-alpine
    container_name: realestate-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command:
      - redis-server
      - --maxmemory ${REDIS_MAXMEMORY:-1gb}
      - --maxmemory-policy ${REDIS_MAXMEMORY_POLICY:-allkeys-lru}
      - --save ""
      - --appendonly no
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - realestate-net

  minio:
    image: minio/minio
    container_name: realestate-minio
    restart: unless-stopped
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":${MINIO_CONSOLE_PORT:-9001}"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - realestate-net

  pushgateway:
    image: prom/pushgateway
    container_name: realestate-pushgateway
    restart: unless-stopped
    ports:
      - "${PUSHGATEWAY_PORT:-9091}:9091"
    networks:
      - realestate-net

  prometheus:
    image: prom/prometheus
    container_name: realestate-prometheus
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./docker/prometheus:/etc/prometheus:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-15d}"
    networks:
      - realestate-net

  alertmanager:
    image: prom/alertmanager
    container_name: realestate-alertmanager
    restart: unless-stopped
    ports:
      - "${ALERTMANAGER_PORT:-9093}:9093"
    volumes:
      - ./docker/alertmanager:/etc/alertmanager:ro
      - alertmanager_data:/alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    networks:
      - realestate-net

volumes:
  postgres_data:
  redis_data:
  minio_data:
  prometheus_data:
  alertmanager_data:

networks:
  realestate-net:
    driver: bridge
